<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Scan & Advance - Glass Aero</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { 'outfit': ['Outfit', 'sans-serif'] },
          colors: {
            'glassAero': {
              'navy': '#0a1628', 'slate': '#1e293b', 'steel': '#334155',
              'sky': '#0ea5e9', 'gold': '#f59e0b', 'emerald': '#10b981',
            }
          }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
    .gradient-bg { background: linear-gradient(135deg, #0a1628 0%, #1e293b 50%, #0f172a 100%); }
    .stat-card { background: linear-gradient(145deg, #1e293b 0%, #0f172a 100%); border: 1px solid rgba(255, 255, 255, 0.1); }
    input { font-size: 1.25rem; }
    .btn-advance { min-height: 80px; font-size: 1.5rem; }
  </style>
</head>
<body class="gradient-bg min-h-screen text-white flex flex-col">

  <!-- Minimal header -->
  <header class="p-4 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-2">
      <div class="w-10 h-10 bg-gradient-to-br from-glassAero-gold to-orange-600 rounded-lg flex items-center justify-center">
        <i class="fas fa-barcode text-white text-lg"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold">Scan & Advance</h1>
        <p class="text-xs text-gray-400">Glass Aero</p>
      </div>
    </div>
    <a href="index.html" class="text-gray-400 hover:text-white transition text-sm">
      <i class="fas fa-home mr-1"></i>Dashboard
    </a>
  </header>

  <main class="flex-1 p-4 flex flex-col">
    <!-- Scan input -->
    <div class="stat-card rounded-2xl p-6 mb-4">
      <label class="block text-sm text-gray-400 mb-2">Scan or type RO number</label>
      <div class="flex gap-3">
        <input type="text" id="scanInput" placeholder="RO-20260301-0001"
          class="flex-1 bg-white/5 border-2 border-white/20 rounded-xl px-4 py-4 text-white placeholder-gray-500 focus:outline-none focus:border-glassAero-gold"
          autocomplete="off" autocapitalize="off" autofocus>
        <button type="button" id="lookupBtn" class="bg-glassAero-gold hover:bg-amber-600 text-black px-6 py-4 rounded-xl font-semibold transition flex-shrink-0">
          <i class="fas fa-search mr-2"></i>Lookup
        </button>
      </div>
    </div>

    <!-- Result area -->
    <div id="resultArea" class="flex-1 hidden">
      <div id="orderCard" class="stat-card rounded-2xl p-6 mb-4">
        <div id="orderContent"></div>
      </div>
    </div>

    <!-- Empty / ready state -->
    <div id="readyState" class="flex-1 flex flex-col items-center justify-center text-center py-8">
      <i class="fas fa-barcode-scan text-6xl text-gray-600 mb-4"></i>
      <p class="text-gray-400 text-lg">Scan a barcode or enter RO number above</p>
      <p class="text-gray-500 text-sm mt-2">Then tap Advance to move to next stage</p>
    </div>

    <!-- Error state -->
    <div id="errorState" class="hidden text-center py-6">
      <i class="fas fa-exclamation-triangle text-5xl text-amber-400 mb-3"></i>
      <p id="errorMessage" class="text-gray-300"></p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js?v=3"></script>
  <script src="js/auth.js?v=2"></script>
  <script src="js/scan.js?v=2"></script>
</body>
</html>
